<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score:<span id="High-Score">0</span></h3>
                </div>
                <div class="info">
                    <h3>Score:<span id="Score">0</span></h3>
                </div>
                <div class="info">
                    <h3>Time:<span id="Time">00:00</span></h3>
                </div>
            </div>
            <div class="board"></div>
            <div class="controls">
                <button onclick="changeDirection('up')">⬆️</button>
                <button onclick="changeDirection('left')">⬅️</button>
                <button onclick="changeDirection('down')">⬇️</button>
                <button onclick="changeDirection('right')">➡️</button>
            </div>
        </section>

        <div class="modal">
            <div class="start-game">
                <h3>Welcome To Snake Game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>

            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
